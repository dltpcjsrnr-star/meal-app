<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성.직.전</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF; --card: #fff; --primary: #0b2d85; --accent: #E8732A;
    --text: #1A1A1A; --muted: #6B6B6B; --border: #E8E3DA; --ok: #16A34A; --err: #DC2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 3rem; }

  .header { background: var(--primary); color: white; padding: 1.25rem; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.7; margin-top: 4px; }

  .section { margin: 1rem; }
  .card { background: var(--card); border-radius: 14px; padding: 1.25rem; border: 1px solid var(--border); margin-bottom: 1rem; }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 1rem; color: var(--primary); }

  .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .text-input { flex: 1; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 13px; background: var(--bg); }
  .text-input:focus { outline: none; border-color: var(--primary); }
  textarea.text-input { resize: vertical; min-height: 100px; }

  .btn { padding: 10px 16px; border: none; border-radius: 10px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-accent { background: var(--accent); color: white; width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 12px; margin-top: 1rem; }
  .btn-accent:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-green { background: var(--ok); color: white; width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 12px; margin-top: 1rem; display: none; }
  .btn-green.show { display: block; }

  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .status { font-size: 12px; margin-top: 6px; }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--err); }

  /* 관리자 인증 */
  .auth-box { background: #FFF7ED; border: 1px solid #FED7AA; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
  .auth-box .auth-title { font-size: 13px; font-weight: 700; color: #9A3412; margin-bottom: 8px; }
  .auth-locked { display: block; }
  .auth-unlocked { display: none; }
  .auth-box.unlocked .auth-locked { display: none; }
  .auth-box.unlocked .auth-unlocked { display: block; font-size: 13px; color: var(--ok); font-weight: 500; }

  .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg); }
  .upload-zone:hover, .upload-zone.over { border-color: var(--primary); background: #F0F7EA; }
  .upload-zone .icon { font-size: 40px; margin-bottom: 0.75rem; }
  .upload-zone p { font-size: 14px; color: var(--muted); }
  #fileInput { display: none; }

  .preview-box { margin-top: 1rem; display: none; }
  .preview-box img { width: 100%; border-radius: 10px; border: 1px solid var(--border); }
  .preview-box .pdf-name { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 10px; padding: 12px; font-size: 14px; color: #1D4ED8; text-align: center; }

  .status-box { margin-top: 1rem; padding: 12px 14px; border-radius: 10px; font-size: 13px; line-height: 1.6; display: none; }
  .status-box.loading { background: #EFF6FF; color: #1D4ED8; display: block; }
  .status-box.success { background: #F0FDF4; color: var(--ok); display: block; }
  .status-box.error { background: #FEF2F2; color: var(--err); display: block; }

  .progress { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; display: none; overflow: hidden; }
  .progress-fill { height: 100%; background: #3B82F6; border-radius: 2px; transition: width 0.4s; }

  .result-day { background: var(--bg); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; border: 1px solid var(--border); }
  .result-day strong { color: var(--primary); }

  .notice-status { font-size: 13px; margin-top: 8px; }
  .notice-status.ok { color: var(--ok); }
  .notice-status.err { color: var(--err); }

  .back-link { display: block; text-align: center; margin: 1rem; color: var(--muted); font-size: 13px; text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <h1>⚙️ 식단 관리자</h1>
  <p>식단표 업로드 및 공지사항 관리</p>
</div>

<div class="section">

  <!-- 관리자 인증 -->
  <div class="card">
    <div class="card-title">🔑 관리자 인증</div>
    <div class="auth-box" id="authBox">
      <div class="auth-title">비밀번호를 입력해야 기능을 사용할 수 있습니다</div>
      <div class="auth-locked">
        <div class="input-row">
          <input type="password" class="text-input" id="adminPw" placeholder="관리자 비밀번호">
          <button class="btn btn-primary" onclick="unlock()">확인</button>
        </div>
        <div class="status err" id="pwError" style="display:none">비밀번호가 틀렸습니다</div>
      </div>
      <div class="auth-unlocked">✓ 인증되었습니다</div>
    </div>
  </div>

  <!-- 식단표 업로드 -->
  <div class="card" id="uploadCard" style="opacity:0.4;pointer-events:none">
    <div class="card-title">📸 식단표 업로드</div>
    <div class="upload-zone" id="uploadZone"
         onclick="document.getElementById('fileInput').click()"
         ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave()">
      <div class="icon">📋</div>
      <p>식단표 이미지 또는 PDF를<br>탭하거나 끌어다 놓으세요</p>
      <p style="font-size:12px;margin-top:8px;opacity:0.6">JPG · PNG · PDF 지원</p>
    </div>
    <input type="file" id="fileInput" accept="image/*,.pdf" onchange="onFileSelect(event)">
    <div class="preview-box" id="previewBox"></div>
    <button class="btn-accent" id="analyzeBtn" onclick="analyzeFile()" disabled>🔍 메뉴 자동 분석하기</button>
    <div class="status-box" id="statusBox"></div>
    <div class="progress" id="progressBar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- 분석 결과 -->
  <div class="card" id="resultCard" style="display:none">
    <div class="card-title">✅ 분석 결과</div>
    <div id="resultContent"></div>

    <!-- 공개 시작일 -->
    <div style="margin-top:1rem;background:var(--bg);border-radius:10px;padding:1rem;border:1px solid var(--border)">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--primary)">📅 공개 시작일 설정</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">이 날짜부터 새 식단이 사용자에게 보입니다</div>
      <input type="date" class="text-input" id="publishDate" style="width:100%">
      <div style="font-size:12px;color:var(--muted);margin-top:6px">※ 비워두면 지금 즉시 공개됩니다</div>
    </div>

    <button class="btn-green show" onclick="publish()">📢 식단 업데이트 적용하기</button>
  </div>

  <!-- 공지사항 -->
  <div class="card" id="noticeCard" style="opacity:0.4;pointer-events:none">
    <div class="card-title">📢 공지사항 관리</div>
    <textarea class="text-input" id="noticeInput" placeholder="공지사항을 입력하세요. 비워두면 공지사항이 숨겨집니다."></textarea>
    <button class="btn btn-primary" style="width:100%;margin-top:10px;padding:12px;font-size:14px" onclick="saveNotice()">공지사항 저장</button>
    <div class="notice-status" id="noticeStatus"></div>
  </div>

</div>

<a href="index.html" class="back-link">← 식단 보기로 돌아가기</a>

<script>
const WORKER_URL = 'https://meal-worker.dltpcjsrnr.workers.dev';
let selectedFile = null;
let parsedData = null;
let isUnlocked = false;
let adminPassword = '';

// 저장된 비밀번호 자동 입력
window.onload = () => {
  const saved = localStorage.getItem('admin_pw');
  if (saved) document.getElementById('adminPw').value = saved;
  loadNotice();
};

async function unlock() {
  const pw = document.getElementById('adminPw').value;
  if (!pw) return;

  // Worker에 테스트 요청으로 비밀번호 확인
  try {
    const resp = await fetch(WORKER_URL + '/notice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': pw },
      body: JSON.stringify({ notice: document.getElementById('noticeInput').value || '' })
    });
    if (resp.status === 401) {
      document.getElementById('pwError').style.display = 'block';
      return;
    }
    // 성공
    adminPassword = pw;
    localStorage.setItem('admin_pw', pw);
    isUnlocked = true;
    document.getElementById('authBox').classList.add('unlocked');
    document.getElementById('pwError').style.display = 'none';
    document.getElementById('uploadCard').style.opacity = '1';
    document.getElementById('uploadCard').style.pointerEvents = 'auto';
    document.getElementById('noticeCard').style.opacity = '1';
    document.getElementById('noticeCard').style.pointerEvents = 'auto';
    loadNotice();
  } catch(e) {
    document.getElementById('pwError').style.display = 'block';
  }
}

async function loadNotice() {
  try {
    const resp = await fetch(WORKER_URL + '/notice');
    const data = await resp.json();
    if (data.notice) document.getElementById('noticeInput').value = data.notice;
  } catch(e) {}
}

async function saveNotice() {
  if (!isUnlocked) return;
  const notice = document.getElementById('noticeInput').value;
  try {
    const resp = await fetch(WORKER_URL + '/notice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword },
      body: JSON.stringify({ notice })
    });
    const data = await resp.json();
    const el = document.getElementById('noticeStatus');
    if (data.success) { el.textContent = '✓ 저장되었습니다'; el.className = 'notice-status ok'; }
    else { el.textContent = '오류: ' + (data.error || '저장 실패'); el.className = 'notice-status err'; }
  } catch(e) {
    document.getElementById('noticeStatus').textContent = '오류: ' + e.message;
    document.getElementById('noticeStatus').className = 'notice-status err';
  }
}

function onDragOver(e) { e.preventDefault(); document.getElementById('uploadZone').classList.add('over'); }
function onDragLeave() { document.getElementById('uploadZone').classList.remove('over'); }
function onDrop(e) { e.preventDefault(); onDragLeave(); const f = e.dataTransfer.files[0]; if (f) setFile(f); }
function onFileSelect(e) { if (e.target.files[0]) setFile(e.target.files[0]); }

function setFile(file) {
  selectedFile = file;
  const box = document.getElementById('previewBox');
  box.style.display = 'block';
  if (file.type === 'application/pdf') {
    box.innerHTML = `<div class="pdf-name">📄 ${file.name}</div>`;
  } else {
    const reader = new FileReader();
    reader.onload = e => { box.innerHTML = `<img src="${e.target.result}">`; };
    reader.readAsDataURL(file);
  }
  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('uploadZone').querySelector('p').textContent = file.name;
}

function setStatus(type, msg) {
  const box = document.getElementById('statusBox');
  box.className = 'status-box ' + type;
  box.textContent = msg;
}

function setProgress(pct) {
  document.getElementById('progressBar').style.display = pct > 0 ? 'block' : 'none';
  document.getElementById('progressFill').style.width = pct + '%';
}

async function analyzeFile() {
  if (!isUnlocked) { alert('먼저 관리자 인증을 해주세요.'); return; }
  if (!selectedFile) { setStatus('error', '파일을 선택해주세요.'); return; }

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('resultCard').style.display = 'none';
  setStatus('loading', '파일을 분석하는 중입니다... (20~40초 소요)');
  setProgress(20);

  try {
    const base64 = await fileToBase64(selectedFile);
    setProgress(50);
    const mimeType = selectedFile.type === 'application/pdf' ? 'application/pdf' : selectedFile.type;

    const resp = await fetch(WORKER_URL + '/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword },
      body: JSON.stringify({ imageBase64: base64, mimeType })
    });

    setProgress(85);
    const result = await resp.json();
    if (!resp.ok || result.error) throw new Error(result.error || '서버 오류');

    parsedData = result.data;
    setProgress(100);
    setStatus('success', `✓ 분석 완료! ${parsedData.days?.length || 0}개 날짜 인식`);
    showResult(parsedData);

  } catch(e) {
    setStatus('error', '오류: ' + e.message);
    setProgress(0);
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function showResult(data) {
  const card = document.getElementById('resultCard');
  card.style.display = 'block';
  const html = (data.days || []).map(d => {
    const meals = ['조식','중식','석식'].filter(m => d[m]).map(m => {
      const meal = d[m];
      return `${m}: ${meal.main || (meal.options?.[0]?.main) || '-'}`;
    }).join(' · ');
    return `<div class="result-day"><strong>${d.key} (${d.date})</strong><br>${meals}</div>`;
  }).join('');
  document.getElementById('resultContent').innerHTML = html;

  // 기본값: 다음 월요일
  const today = new Date();
  const day = today.getDay();
  const daysUntilMonday = day === 0 ? 1 : (8 - day) % 7 || 7;
  const nextMonday = new Date(today);
  nextMonday.setDate(today.getDate() + daysUntilMonday);
  document.getElementById('publishDate').value = nextMonday.toISOString().split('T')[0];

  setProgress(0);
}

async function publish() {
  if (!parsedData) return;
  const publishDate = document.getElementById('publishDate').value;

  // publishDate를 데이터에 추가해서 Worker에 저장
  const dataToSave = { ...parsedData, publishDate: publishDate || null };

  try {
    const resp = await fetch(WORKER_URL + '/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword },
      body: JSON.stringify({ data: dataToSave })
    });
    const result = await resp.json();
    if (!result.success) throw new Error(result.error || '저장 실패');

    const msg = publishDate
      ? `✅ 저장되었습니다!\n${publishDate} 부터 새 식단이 공개됩니다.`
      : '✅ 식단이 즉시 업데이트되었습니다!';
    alert(msg);
    window.location.href = 'index.html';
  } catch(e) {
    alert('오류: ' + e.message);
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('파일 읽기 실패'));
    r.readAsDataURL(file);
  });
}
</script>
</body>
</html>
