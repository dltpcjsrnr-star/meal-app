<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>버스 도착정보</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0b2d85;
    --navy-dark: #071d59;
    --navy-soft: #eef1fb;
    --ok: #1a8f4c;
    --warn: #d9534f;
    --text: #1c1f2b;
    --sub: #6b7080;
    --bg: #f4f5f9;
    --card: #ffffff;
    --border: #e4e6ef;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: linear-gradient(135deg, var(--navy), var(--navy-dark));
    color: #fff;
    padding: 20px 16px 24px;
  }
  header h1 { margin: 0 0 4px; font-size: 20px; font-weight: 900; }
  header p { margin: 0; font-size: 13px; opacity: 0.85; }

  main { max-width: 480px; margin: -14px auto 40px; padding: 0 12px; }

  .card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 2px 10px rgba(11,45,133,0.08);
    padding: 14px;
    margin-bottom: 12px;
  }

  .search-row { display: flex; gap: 8px; }
  .search-row input {
    flex: 1;
    padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
  }
  .search-row button {
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 16px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  .search-row button:active { background: var(--navy-dark); }

  .quick-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .quick-tags button {
    background: var(--navy-soft);
    color: var(--navy);
    border: 1px solid #d7deef;
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12.5px;
    cursor: pointer;
    font-family: inherit;
  }

  .result-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 4px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item .name { font-weight: 700; }
  .result-item .id { color: var(--sub); font-size: 11.5px; }
  .result-item button {
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }

  .stop-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
  .stop-tabs button {
    flex: none;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    color: var(--sub);
    cursor: pointer;
    font-family: inherit;
  }
  .stop-tabs button.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  .refresh-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 2px 8px;
    font-size: 12px;
    color: var(--sub);
  }
  .refresh-bar button {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--navy);
    cursor: pointer;
  }

  #arrivalList { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0; }
  .bus-chip {
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
    background: var(--navy-soft);
    color: var(--navy);
    border-radius: 999px;
    padding: 8px 14px;
    font-weight: 900;
    font-size: 15px;
  }
  .bus-chip.near { background: var(--navy); color: #fff; }
  .bus-chip.near .chip-status { color: #cfe0ff; }
  .bus-chip.imminent { background: #fff3e0; color: #c0451c; border: 2px solid #f0a04b; }
  .bus-chip.imminent .chip-status { color: #c0451c; font-weight: 800; }
  .chip-status { font-weight: 500; font-size: 12.5px; color: var(--sub); }

  .empty, .loading, .error-box {
    text-align: center;
    color: var(--sub);
    font-size: 13px;
    padding: 24px 8px;
  }
  .error-box { color: var(--warn); }

  .config-box textarea {
    width: 100%;
    font-family: monospace;
    font-size: 12px;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .config-box p { font-size: 12px; color: var(--sub); margin: 6px 0; }
</style>
</head>
<body>

<header>
  <h1>🚌 버스 도착정보</h1>
  <p id="subtitle">등록된 정류장이 없습니다. 정류장을 검색해 추가하세요.</p>
</header>

<main>

  <!-- 정류장 검색 -->
  <div class="card">
    <div class="search-row">
      <input id="searchInput" placeholder="정류장 이름으로 검색 (예: 성빈센트병원)" />
      <button onclick="searchStation()">검색</button>
    </div>
    <div id="searchResults"></div>
  </div>

  <!-- 등록된 정류장 탭 -->
  <div id="stopTabsWrap" class="card" style="display:none;">
    <div class="stop-tabs" id="stopTabs"></div>
  </div>

  <!-- 도착정보 -->
  <div class="card" id="arrivalCard" style="display:none;">
    <div class="refresh-bar">
      <span id="lastUpdated">-</span>
      <button onclick="loadArrivals(true)">↻ 새로고침</button>
    </div>
    <div id="arrivalList"></div>
  </div>

</main>

<script>
  const LS_STOPS = 'bus_info_saved_stops';
  const LS_DEFAULTS_DONE = 'bus_info_defaults_applied';
  const WORKER_URL = 'https://bus-info.dltpcjsrnr.workers.dev';
  const DEFAULT_STOPS = [
    { stationId: '202000007', name: '성빈센트병원' },
    { stationId: '202000082', name: '한국전력경기사업본부·한라시그마팰리스' },
    { stationId: '202000008', name: '동수원사거리' },
  ];

  let savedStops = JSON.parse(localStorage.getItem(LS_STOPS) || '[]');
  if (!localStorage.getItem(LS_DEFAULTS_DONE)) {
    savedStops = DEFAULT_STOPS.slice();
    localStorage.setItem(LS_STOPS, JSON.stringify(savedStops));
    localStorage.setItem(LS_DEFAULTS_DONE, '1');
  }
  let activeStopId = savedStops[0]?.stationId || null;
  let refreshTimer = null;

  function getWorkerUrl() {
    return WORKER_URL;
  }

  // init
  (function init() {
    renderStopTabs();
    if (activeStopId) loadArrivals();
  })();

  function quickSearch(name) {
    document.getElementById('searchInput').value = name;
    searchStation();
  }

  async function searchStation() {
    const keyword = document.getElementById('searchInput').value.trim();
    const resultsEl = document.getElementById('searchResults');
    if (!keyword) return;
    resultsEl.innerHTML = '<div class="loading">검색 중…</div>';
    try {
      const res = await fetch(`${getWorkerUrl()}/api/search?keyword=${encodeURIComponent(keyword)}`);
      const data = await res.json();
      const items = extractList(data, ['busStationList', 'stationList', 'items', 'item']);
      if (!items.length) {
        resultsEl.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
        return;
      }
      resultsEl.innerHTML = items.map(it => {
        const id = it.stationId ?? it.STATION_ID ?? it.id ?? '';
        const name = it.stationName ?? it.STATION_NM ?? it.name ?? '(이름없음)';
        const mobileNo = it.mobileNo ?? it.STATION_NO ?? '';
        return `<div class="result-item">
          <div><div class="name">${name}</div><div class="id">ID: ${id}${mobileNo ? ' · 번호: ' + mobileNo : ''}</div></div>
          <button onclick='addStop(${JSON.stringify(id)}, ${JSON.stringify(name)})'>추가</button>
        </div>`;
      }).join('');
    } catch (e) {
      resultsEl.innerHTML = `<div class="error-box">검색 실패: ${e}</div>`;
    }
  }

  function addStop(stationId, name) {
    if (!stationId) { alert('이 항목에는 stationId가 없습니다. 원본 응답을 확인해주세요.'); return; }
    if (savedStops.some(s => String(s.stationId) === String(stationId))) return;
    savedStops.push({ stationId: String(stationId), name });
    localStorage.setItem(LS_STOPS, JSON.stringify(savedStops));
    activeStopId = String(stationId);
    renderStopTabs();
    loadArrivals();
  }

  function removeStop(stationId) {
    savedStops = savedStops.filter(s => s.stationId !== stationId);
    localStorage.setItem(LS_STOPS, JSON.stringify(savedStops));
    if (activeStopId === stationId) activeStopId = savedStops[0]?.stationId || null;
    renderStopTabs();
    if (activeStopId) loadArrivals(); else document.getElementById('arrivalCard').style.display = 'none';
  }

  function renderStopTabs() {
    const wrap = document.getElementById('stopTabsWrap');
    const tabs = document.getElementById('stopTabs');
    if (!savedStops.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    tabs.innerHTML = savedStops.map(s => `
      <button class="${s.stationId === activeStopId ? 'active' : ''}"
              onclick="selectStop('${s.stationId}')"
              oncontextmenu="event.preventDefault(); removeStop('${s.stationId}')">
        ${s.name}
      </button>`).join('');
    document.getElementById('subtitle').textContent =
      `등록된 정류장 ${savedStops.length}개 · 탭을 길게 누르면(우클릭) 삭제`;
  }

  function selectStop(stationId) {
    activeStopId = stationId;
    renderStopTabs();
    loadArrivals();
  }

  function extractList(data, keys) {
    const body = data?.response?.msgBody || data?.msgBody || data;
    for (const k of keys) {
      if (body?.[k]) return Array.isArray(body[k]) ? body[k] : [body[k]];
    }
    // fallback: find first array anywhere in the object
    const found = deepFindArray(data);
    return found || [];
  }

  function deepFindArray(obj, depth = 0) {
    if (depth > 4 || !obj || typeof obj !== 'object') return null;
    for (const v of Object.values(obj)) {
      if (Array.isArray(v) && v.length && typeof v[0] === 'object') return v;
    }
    for (const v of Object.values(obj)) {
      if (v && typeof v === 'object') {
        const r = deepFindArray(v, depth + 1);
        if (r) return r;
      }
    }
    return null;
  }

  // 정렬 기준: 분 단위 예측이 있는 버스가 먼저(빠른 순), 그다음 정류장 수만 있는 버스,
  // 마지막으로 정보없음
  function sortKey(it) {
    const t = it.predictTime1 ?? it.PREDICT_TIME1;
    if (t !== undefined && t !== null && t !== '') {
      const n = Number(t);
      if (!isNaN(n)) return n;
    }
    const loc = it.locationNo1 ?? it.LOCATION_NO1;
    if (loc !== undefined && loc !== null && loc !== '') {
      const n = Number(loc);
      if (!isNaN(n) && n > 0) return 1000 + n;
    }
    return 999999;
  }

  async function loadArrivals(manual) {
    if (!activeStopId) return;
    const card = document.getElementById('arrivalCard');
    const list = document.getElementById('arrivalList');
    card.style.display = 'block';
    if (manual) list.innerHTML = '<div class="loading">불러오는 중…</div>';
    try {
      const res = await fetch(`${getWorkerUrl()}/api/arrivals?stationId=${encodeURIComponent(activeStopId)}`);
      const data = await res.json();

      const items = extractList(data, ['busArrivalList', 'arrivalList', 'items', 'item']);
      items.sort((a, b) => sortKey(a) - sortKey(b));
      if (!items.length) {
        list.innerHTML = '<div class="empty">현재 도착 예정 정보가 없습니다.</div>';
      } else {
        list.innerHTML = items.map(renderBusItem).join('');
      }
      document.getElementById('lastUpdated').textContent =
        '업데이트: ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch (e) {
      list.innerHTML = `<div class="error-box">불러오기 실패: ${e}</div>`;
    }
    if (refreshTimer) clearTimeout(refreshTimer);
    refreshTimer = setTimeout(() => loadArrivals(), 30000);
  }

  // 분 단위 예측이 있으면 "N분후", 없고 정류장 수(locationNo)만 있으면
  // "전"을 그 수만큼 반복 (1정류장 전="전", 2정류장 전="전전" …), 4개 넘어가면 "N번째 전"
  function busStatusLabel(it) {
    const t = it.predictTime1 ?? it.PREDICT_TIME1;
    if (t !== undefined && t !== null && t !== '') {
      const n = Number(t);
      if (!isNaN(n)) {
        if (n <= 0) return '곧도착';
        return `${n}분후`;
      }
    }
    const loc = it.locationNo1 ?? it.LOCATION_NO1;
    if (loc !== undefined && loc !== null && loc !== '') {
      const n = Number(loc);
      if (!isNaN(n) && n > 0) {
        return n <= 4 ? '전'.repeat(n) : `${n}번째 전`;
      }
    }
    return '정보없음';
  }

  // 정류장 전광판과 동일한 혼잡도 표기 (1=여유, 2=보통, 3=혼잡)
  function crowdLabel(it) {
    const c = it.crowded1 ?? it.CROWDED1;
    const n = Number(c);
    if (n === 1) return '여유';
    if (n === 2) return '보통';
    if (n === 3) return '혼잡';
    return null;
  }

  function renderBusItem(it) {
    const routeName = it.routeName ?? it.ROUTE_NM ?? it.routeId ?? '노선';
    const status = busStatusLabel(it);
    const crowd = crowdLabel(it);
    const imminent = status === '곧도착';
    const near = !imminent && status.endsWith('분후') && parseInt(status) <= 3;
    const label = crowd ? `${crowd} ${status}` : status;
    return `<span class="bus-chip${imminent ? ' imminent' : near ? ' near' : ''}">${routeName}<span class="chip-status">(${label})</span></span>`;
  }
</script>

</body>
</html>
